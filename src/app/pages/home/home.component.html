<div class="main">
    <div *ngFor="let data of pages[0].component">
        <app-header class="header" *ngIf="data.compId === 1" [headerData]="data.metadata"></app-header>
        <app-notices class="notices" *ngIf="data.compID === 2" [InputData]="data.metadata"></app-notices>
        <app-banner-carousel class="banner-carousel" *ngIf="data.compId === 3" [carousel2]="data.metadata">
        </app-banner-carousel>
        <app-container1 class="aboutus-section" *ngIf="data.compId ===4" [mergedData]="data.metadata"></app-container1>
    </div>
    <!-- <app-container1 class="aboutus-section" ></app-container1> -->
    <div class="accordian" *ngFor="let comp of pages[currentPageIndex].component">
        <app-accordian-dropdwn *ngIf="comp.compID === 5" [DropDownData]="comp.metadata"></app-accordian-dropdwn>

    </div>
    <div *ngFor="let comp of pages[0].component">
        <app-card-carousel *ngIf="comp.compId === 6" [cardConfig]="comp.metadata"></app-card-carousel>
    </div>

    <div class="testimonials" *ngFor="let data of pages[0].component">
        <app-container3 *ngIf="data.compId===7" [sectionData]="data.metadata"></app-container3><!-- 
        <app-footer *ngIf="data.compId===8" [footerData]="data.metadata"></app-footer> -->
    </div>

</div>
