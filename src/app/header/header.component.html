<header *ngIf="headerData">
    <div *ngFor="let datas of headerData">
    <div class="top" >
       <!--  <h3>{{data.impLinks}}</h3> -->
       <ul *ngFor="let data of datas.implinksdata">
        <li><a [href]="data.routeLinks"></a>
        {{data.impLinks}}
        </li>
       </ul>
    </div>
    <div class="bottom" *ngFor="let data of datas.logo">
        <!-- <img src="assets/images/Chetana Logo.svg" alt=""> -->
        <img [src]="data.logoUrl" [alt]="data.logoAlt">
        <div class="navbar">
            <ul *ngFor="let content of datas.navbar">
                <li ngbDropdown class="nav-item" *ngIf="content.child">
                    <a [href]="content.link" (click)="false" class="nav-link" ngbDropdownToggle>{{content.nav}}</a>
                    <!-- {{content.child | json}} -->
                    <div ngbDropdownMenu class="dropdown-list">
                        <a *ngFor="let data of content.child" class="dropdown-item" [href]="data.url">{{data.dropdown}}</a>
                    </div>
                </li>
                <li class="nav-item" *ngIf="!content.child">
                    <a [href]="content.link" (click)="false" class="nav-link" >{{content.nav}}</a>
                </li>
            </ul>
        </div>
    </div>
</div>
</header>
