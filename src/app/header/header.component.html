<header>
    <div class="top">
        <h3></h3>
    </div>
    <div class="bottom">
        <img src="assets/images/Chetana Logo.svg" alt="">
        <div class="navbar">
            <ul *ngFor="let datas of headerData">
                <li ngbDropdown class="nav-item" *ngIf="datas.child">
                    <a [href]="datas.link" (click)="false" class="nav-link" ngbDropdownToggle>{{datas.nav}}</a>
                    <!-- {{datas.child | json}} -->
                    <div ngbDropdownMenu class="dropdown-list">
                        <a *ngFor="let data of datas.child" class="dropdown-item" [href]="data.url">{{data.dropdown}}</a>
                    </div>
                </li>
                <li class="nav-item" *ngIf="!datas.child">
                    <a [href]="datas.link" (click)="false" class="nav-link" >{{datas.nav}}</a>
                </li>
            </ul>
        </div>
    </div>
</header>
